<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FIFA World Cup 2026 Schedule IST</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="styles.css" />
</head>

<body class="bg-zinc-950 text-white min-h-screen">

  <!-- HEADER -->
  <header class="sticky top-0 z-50 bg-black/70 backdrop-blur border-b border-zinc-800">
    <div class="max-w-6xl mx-auto px-4 py-4">

      <div class="flex flex-col md:flex-row gap-4 md:items-center md:justify-between">

        <div>
          <h1 class="text-3xl font-bold">
            ⚽ FIFA World Cup 2026
          </h1>

          <p class="text-zinc-400 text-sm mt-1">
            All Match Times in IST
          </p>
        </div>

        <!-- SEARCH -->
        <input
          id="searchInput"
          type="text"
          placeholder="Search teams..."
          class="bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-2 outline-none focus:border-blue-500"
        />

      </div>
    </div>
  </header>

  <!-- CONTENT -->
  <main class="max-w-6xl mx-auto px-4 py-8">

    <!-- TODAY -->
    <section class="mb-10">
      <h2 class="text-2xl font-bold mb-4">
        Today's Matches
      </h2>

      <div id="todayMatches" class="grid gap-4"></div>
    </section>

    <!-- ALL MATCHES -->
    <section>
      <h2 class="text-2xl font-bold mb-6">
        Full Schedule
      </h2>

      <div id="matchesContainer" class="grid gap-4"></div>
    </section>

  </main>

  <footer class="text-center py-10 text-zinc-500 text-sm">
    Built for football fans ⚽
  </footer>

  <script src="script.js"></script>

</body>
</html>
