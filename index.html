<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>FIFA 2026 Schedule IST</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="styles.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body class="bg-black text-white">

  <!-- BACKGROUND -->
  <div class="bg-gradient"></div>

  <!-- HEADER -->
  <header class="sticky top-0 z-50 backdrop-blur-xl border-b border-white/10 bg-black/40">

    <div class="max-w-6xl mx-auto px-4 py-4">

      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">

        <div>
          <h1 class="text-3xl md:text-5xl font-extrabold">
            FIFA 2026
          </h1>

          <p class="text-zinc-400 mt-1">
            All Match Times in IST 🇮🇳
          </p>
        </div>

        <div class="flex flex-col md:flex-row gap-3">

  <div class="flex flex-col md:flex-row gap-3">

  <!-- SEARCH -->
  <input
    id="searchInput"
    type="text"
    placeholder="Search team..."
    class="search-box"
  />

  <!-- TIMEZONE -->
  <select
    id="timezoneSelect"
    class="search-box"
  >
  </select>

</div>

  <!-- TIMEZONE -->
  <select
    id="timezoneSelect"
    class="search-box"
  >
  </select>

</div>

      </div>

    </div>

  </header>

  <!-- MAIN -->
  <main class="max-w-5xl mx-auto px-4 py-10">

    <!-- TABS -->
    <section class="mb-14">

      <div class="flex gap-3 mb-6">

        <button
          class="tab-button active-tab"
          data-tab="today"
        >
          Today
        </button>

        <button
          class="tab-button"
          data-tab="tomorrow"
        >
          Tomorrow
        </button>

      </div>

      <div id="tabMatches"></div>

    </section>

    <!-- SCHEDULE -->
    <section>

      <div class="section-title">
        📅 Full Schedule
      </div>

      <div id="matchesContainer"></div>

    </section>

  </main>

  <footer class="py-10 text-center text-zinc-500 text-sm">
    Built for football fans ⚽
  </footer>

  <script src="script.js"></script>

</body>
</html>
